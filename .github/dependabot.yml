version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Jakarta
    labels:
      - "dependencies"
      - "github-actions"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
      include: scope

  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "09:15"
      timezone: Asia/Jakarta
    labels:
      - "dependencies"
      - "backend"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
      include: scope

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: Asia/Jakarta
    labels:
      - "dependencies"
      - "frontend"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
      include: scope
